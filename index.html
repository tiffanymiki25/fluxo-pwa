<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fluxo — Octa44 Hub</title>
<meta name="description" content="Captura única para tarefas, ideias e pensamentos do dia.">
<meta name="theme-color" content="#6B3FF6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <div class="brand" style="margin-bottom: 24px;">
      <span class="brand-dot" aria-hidden="true"></span>
      Fluxo
    </div>

    <div class="auth-tabs">
      <button id="authTabLogin" class="auth-tab active">Entrar</button>
      <button id="authTabSignup" class="auth-tab">Criar conta</button>
    </div>

    <form id="authForm">
      <div class="field" id="fieldNome" style="display:none;">
        <label for="authNome">Seu nome</label>
        <input type="text" id="authNome" autocomplete="name" placeholder="Tiffany, Amanda ou Marcelo">
      </div>
      <div class="field">
        <label for="authEmail">E-mail</label>
        <input type="email" id="authEmail" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="authPassword">Senha</label>
        <input type="password" id="authPassword" autocomplete="current-password" required minlength="6">
      </div>
      <button type="submit" id="authSubmit" class="auth-submit">Entrar</button>
      <div id="authError" class="auth-error"></div>
    </form>
  </div>
</div>

<div id="app" style="display:none;">

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      Fluxo
    </div>
    <div class="view-toggle">
      <button class="icon-btn" id="logoutBtn" title="Sair" aria-label="Sair da conta">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </header>

  <section class="capture">
    <div class="capture-box">
      <label for="captureInput" class="sr-only">Anotar algo</label>
      <textarea id="captureInput" rows="1" placeholder="O que passou pela cabeça?" autocomplete="off"></textarea>
      <button class="capture-send" id="captureSend" disabled aria-label="Salvar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="capture-hint">Sem categoria, sem prazo, sem decisão agora. Só escreve.</div>
  </section>

  <main>
    <!-- Tela: próximo item -->
    <div class="next-stage" id="nextStage">
      <div id="nextContent">
        <!-- preenchido via JS -->
      </div>
    </div>

    <!-- Tela: lista completa -->
    <div class="list-view" id="listView">
      <div id="pendingList"></div>
      <div id="doneList"></div>
    </div>

    <!-- Tela: compartilhados comigo -->
    <div class="list-view" id="sharedView">
      <div id="sharedList"></div>
    </div>

    <!-- Tela: registro de postagens -->
    <div class="list-view" id="postsView">
      <div class="post-form">
        <textarea id="postText" rows="2" placeholder="O que vai ser postado?"></textarea>
        <div class="project-row" id="postProjectRow"></div>
        <button id="postSubmit" class="auth-submit" style="margin-top:10px;" disabled>Adicionar aos planejados</button>
      </div>

      <div class="project-filter-row" id="postFilterRow"></div>

      <div id="postsPlanejados"></div>
      <div id="postsPublicados"></div>
    </div>
  </main>

  <nav class="tabbar">
    <button id="navNext" class="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Agora
    </button>
    <button id="navList">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Tudo
    </button>
    <button id="navShared">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
      Compart.
    </button>
    <button id="navPosts">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M8 16h5M8 8h3"/></svg>
      Postagens
    </button>
  </nav>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/postagens.js"></script>
<script src="js/app.js"></script>
</body>
</html>

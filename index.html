<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fluxo — Octa44 Hub</title>
<meta name="description" content="Captura única para tarefas, ideias e pensamentos do dia.">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      Fluxo
    </div>
    <div class="view-toggle">
      <button class="icon-btn active" id="tabNext" title="Próximo item" aria-label="Ver próximo item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      </button>
      <button class="icon-btn" id="tabList" title="Ver tudo" aria-label="Ver lista completa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      </button>
    </div>
  </header>

  <section class="capture">
    <div class="capture-box">
      <label for="captureInput" class="sr-only">Anotar algo</label>
      <textarea id="captureInput" rows="1" placeholder="O que passou pela cabeça?" autocomplete="off"></textarea>
      <button class="capture-send" id="captureSend" disabled aria-label="Salvar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="capture-hint">Sem categoria, sem prazo, sem decisão agora. Só escreve.</div>
  </section>

  <main>
    <!-- Tela: próximo item -->
    <div class="next-stage" id="nextStage">
      <div id="nextContent">
        <!-- preenchido via JS -->
      </div>
    </div>

    <!-- Tela: lista completa -->
    <div class="list-view" id="listView">
      <div id="pendingList"></div>
      <div id="doneList"></div>
    </div>
  </main>

  <nav class="tabbar">
    <button id="navNext" class="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Agora
    </button>
    <button id="navList">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Tudo
    </button>
  </nav>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
</body>
</html>
